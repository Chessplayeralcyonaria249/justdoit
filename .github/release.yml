changelog:
  exclude:
    labels:
      - skip-changelog
    authors:
      - dependabot
  categories:
    - title: "🚀 New Features"
      labels:
        - enhancement
        - feat
    - title: "🎯 Skill Updates"
      labels:
        - skill
    - title: "📚 Documentation"
      labels:
        - documentation
        - docs
    - title: "🔧 Maintenance"
      labels:
        - chore
        - refactor
        - fix
    - title: "Other Changes"
      labels:
        - "*"
